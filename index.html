<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Workshop Resin & Mould System</title>

<style>
body {
    font-family: Arial;
    background: #1e1e1e;
    color: white;
    margin: 0;
}
header {
    background: #ff6600;
    padding: 15px;
    text-align: center;
    font-size: 22px;
    font-weight: bold;
}
.container { padding: 20px; }

input, select {
    width: 100%;
    padding: 14px;
    margin: 8px 0;
    font-size: 16px;
    border-radius: 6px;
    border: none;
}

button {
    width: 100%;
    padding: 16px;
    font-size: 18px;
    background: #ff6600;
    color: white;
    border: none;
    border-radius: 6px;
}

.result, .glassBox {
    margin-top: 20px;
    background: #2a2a2a;
    padding: 15px;
    border-radius: 8px;
}

.warning { color: orange; font-weight: bold; }
.danger { color: red; font-weight: bold; }
</style>
</head>

<body>

<header>Workshop Resin & Mould Operator System</header>

<div class="container">

<select id="resinType">
    <option value="summer">Summer (70 min @2%)</option>
    <option value="infusion">Infusion (35 min @1.5%)</option>
    <option value="winter">Winter (25 min @2%)</option>
</select>

<input type="number" step="0.01" id="resinWeight" placeholder="Resin Weight (kg)">
<input type="number" id="tempInput" placeholder="Temperature °C">
<input type="number" id="humidityInput" placeholder="Humidity %">
<input type="number" id="jobTime" placeholder="Desired Working Time (mins)">

<button onclick="calculateResin()">Calculate</button>

<div class="result" id="resinResult"></div>

</div>

<script>

function calculateResin() {

    const resinKg = parseFloat(document.getElementById("resinWeight").value);
    const temp = parseFloat(document.getElementById("tempInput").value);
    const humidity = parseFloat(document.getElementById("humidityInput").value);
    const desiredTime = parseFloat(document.getElementById("jobTime").value);
    const type = document.getElementById("resinType").value;

    if (!resinKg || !temp || !humidity || !desiredTime) {
        document.getElementById("resinResult").innerHTML = "Fill in all fields.";
        return;
    }

    let gelTime, basePercent, catalystName;

    if (type === "winter") {
        gelTime = 25;
        basePercent = 2;
        catalystName = "M100";
    } 
    else if (type === "infusion") {
        gelTime = 35;
        basePercent = 1.5;
        catalystName = "M200";
    } 
    else {
        gelTime = 70;
        basePercent = 2;
        catalystName = "M100";
    }

    const workingMargin = 0.7;
    const baseWorkingTime = gelTime * workingMargin;

    const tempFactor = Math.pow(2, (temp - 25) / 10);
    const adjustedWorkingTime = baseWorkingTime / tempFactor;

    let catalystPercent = (basePercent/100) * (adjustedWorkingTime / desiredTime);

    if (humidity > 40)
        catalystPercent += (humidity - 40) * 0.00002;

    catalystPercent = Math.max(0.01, Math.min(0.03, catalystPercent));

    let finalWorkingTime = adjustedWorkingTime * ((basePercent/100) / catalystPercent);

    const resinGrams = resinKg * 1000;
    const catalystML = (resinGrams * catalystPercent) / 1.1;

    let html =
        `Resin: <b>${resinKg.toFixed(2)} kg</b><br>` +
        `Catalyst Type: <b style="color:#ff6600;">${catalystName}</b><br>` +
        `Catalyst %: <b>${(catalystPercent*100).toFixed(2)}%</b><br>` +
        `Catalyst Amount: <b>${catalystML.toFixed(1)} mL</b><br>` +
        `Working Time: ~${finalWorkingTime.toFixed(0)} mins<br>`;

    if (finalWorkingTime < 5)
        html += "<div class='danger'>⚠ EXTREME FAST KICK RISK</div>";

    document.getElementById("resinResult").innerHTML = html;
}

</script>

</body>
</html>
