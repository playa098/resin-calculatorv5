<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fibreglass Workshop Resin Calculator</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #1e1e1e;
    color: white;
    margin: 0;
    padding: 0;
}
header {
    background: #ff6600;
    padding: 15px;
    text-align: center;
    font-size: 22px;
    font-weight: bold;
}
.container { padding: 20px; }

input, select {
    width: 100%;
    padding: 15px;
    margin: 10px 0;
    font-size: 18px;
    border-radius: 6px;
    border: none;
}

button {
    width: 100%;
    padding: 18px;
    font-size: 20px;
    background: #ff6600;
    color: white;
    border: none;
    border-radius: 6px;
}

.result {
    margin-top: 20px;
    font-size: 22px;
    font-weight: bold;
}
</style>
</head>

<body>

<header>
Fibreglass Workshop Resin Calculator
</header>

<div class="container">

<h2>Resin Type</h2>

<select id="resinType" onchange="setResinDefaults()">
<option value="custom">Custom Gel Test</option>
<option value="infusion">Infusion Resin</option>
<option value="gpwinter">GP Resin (Winter)</option>
<option value="gpsummer">GP Resin (Summer)</option>
<option value="vinylester">Vinylester Resin</option>
</select>


<h2>Resin Calibration</h2>

<label>Base Temperature (°C)</label>
<input id="baseTemp" type="number" value="25">

<label>Base Catalyst (%)</label>
<input id="baseCat" type="number" value="1.5">

<label>Base Gel Time (minutes)</label>
<input id="baseGel" type="number" value="35">


<h2>Current Conditions</h2>

<label>Workshop Temperature (°C)</label>
<input id="workshopTemp" type="number">

<label>Resin Temperature (°C)</label>
<input id="resinTemp" type="number">

<label>Mould Temperature (°C)</label>
<input id="mouldTemp" type="number">

<label>Desired Working Time (minutes)</label>
<input id="workingTime" type="number" placeholder="Enter OR catalyst %">

<label>Catalyst (%)</label>
<input id="catalystInput" type="number" placeholder="Enter OR working time">

<label>Resin Amount (kg)</label>
<input id="resinWeight" type="number" step="0.01">

<button onclick="calculate()">Calculate</button>

<div class="result" id="result"></div>

</div>

<script>

function setResinDefaults(){

let type = document.getElementById("resinType").value;

if(type == "infusion"){
document.getElementById("baseTemp").value = 25;
document.getElementById("baseCat").value = 1.5;
document.getElementById("baseGel").value = 35;
}

if(type == "gpwinter"){
document.getElementById("baseTemp").value = 25;
document.getElementById("baseCat").value = 2;
document.getElementById("baseGel").value = 25;
}

if(type == "gpsummer"){
document.getElementById("baseTemp").value = 25;
document.getElementById("baseCat").value = 2;
document.getElementById("baseGel").value = 70;
}

if(type == "vinylester"){
document.getElementById("baseTemp").value = 25;
document.getElementById("baseCat").value = 2;
document.getElementById("baseGel").value = 40;
}

}

function calculate(){

let baseTemp = parseFloat(document.getElementById("baseTemp").value);
let baseCat = parseFloat(document.getElementById("baseCat").value);
let baseGel = parseFloat(document.getElementById("baseGel").value);

let workshopTemp = parseFloat(document.getElementById("workshopTemp").value);
let resinTemp = parseFloat(document.getElementById("resinTemp").value);
let mouldTemp = parseFloat(document.getElementById("mouldTemp").value);

let workingTime = parseFloat(document.getElementById("workingTime").value);
let catalystInput = parseFloat(document.getElementById("catalystInput").value);
let resinKg = parseFloat(document.getElementById("resinWeight").value);

if(isNaN(workshopTemp) || isNaN(resinTemp) || isNaN(mouldTemp) || isNaN(resinKg)){
document.getElementById("result").innerHTML = "Please enter all temperatures and resin amount.";
return;
}

let resinGrams = resinKg * 1000;

let reactionTemp = 0.5*resinTemp + 0.3*mouldTemp + 0.2*workshopTemp;

let tempFactor = Math.pow(0.5, (reactionTemp - baseTemp)/10);

let catalystPercent;
let gelTime;
let degasTime = 0;

if(!isNaN(workingTime) && isNaN(catalystInput)){

catalystPercent = baseCat * ((baseGel * tempFactor) / workingTime);

if(catalystPercent > 3){
catalystPercent = 3;
gelTime = baseGel * (baseCat / catalystPercent) * tempFactor;
degasTime = gelTime - workingTime;
}
else{
gelTime = workingTime;
}

}

else if(!isNaN(catalystInput) && isNaN(workingTime)){

catalystPercent = catalystInput;
gelTime = baseGel * (baseCat / catalystPercent) * tempFactor;

}

else{

document.getElementById("result").innerHTML =
"Enter either Working Time OR Catalyst %, not both.";
return;

}

let catalystGrams = resinGrams * (catalystPercent / 100);

let catalystML = catalystGrams / 1.1;

let output =
"Weighted Reaction Temperature: " + reactionTemp.toFixed(2) + " °C<br>" +
"Catalyst: " + catalystPercent.toFixed(2) + "%<br>" +
"Catalyst Volume: " + catalystML.toFixed(2) + " ml<br>" +
"Estimated Gel Time: " + gelTime.toFixed(2) + " minutes";

if(degasTime > 0){
output += "<br>Degas Time: " + degasTime.toFixed(2) + " minutes";
}

document.getElementById("result").innerHTML = output;

}

</script>

</body>
</html>
